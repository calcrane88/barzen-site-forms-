<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>Test &amp; Tag — Barzen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --orange: #e8842c;
    --dark: #3a3a3a;
    --label: #444;
    --muted: #666;
    --input-bg: #f5f5f5;
    --border: #ccc;
    --section-bg: #eee;
    --white: #fff;
    --green: #1a6b3f;
    --red: #c62828;
    --blue: #24497a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: #f0f0f0;
    color: var(--dark);
    -webkit-text-size-adjust: 100%;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  .page { max-width: 700px; margin: 0 auto; padding: 10px; }

  .hdr {
    background: var(--white); border-radius: 12px;
    padding: 16px; margin-bottom: 10px;
    border-top: 4px solid var(--orange);
  }
  .hdr-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .logo-b { width: 40px; height: 44px; background: var(--dark); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-b span { font-size: 30px; font-weight: 800; color: var(--orange); font-family: Arial; }
  .logo-txt { font-size: 22px; font-weight: 800; color: var(--dark); font-family: Arial; }
  .logo-txt small { display: block; font-size: 10px; font-weight: 400; letter-spacing: 5px; color: var(--muted); }
  .hdr h1 { font-size: 20px; font-weight: 700; }
  .hdr-meta { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .card { background: var(--white); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .card-hd { background: var(--section-bg); padding: 10px 14px; border-left: 4px solid var(--orange); font-size: 14px; font-weight: 700; }
  .card-bd { padding: 12px 14px; }

  .fld { margin-bottom: 12px; }
  .fld:last-child { margin-bottom: 0; }
  .fld-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--label); letter-spacing: .3px; margin-bottom: 5px; display: block; }
  .fld-input {
    width: 100%; background: var(--input-bg); border: 1px solid #ddd; border-radius: 8px;
    padding: 12px; font-size: 15px; font-family: inherit; color: var(--dark);
    outline: none; -webkit-appearance: none; appearance: none;
  }
  .fld-input:focus { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(232,132,44,.2); }
  select.fld-input {
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='7' viewBox='0 0 12 7' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23666' fill='none' stroke-width='2'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px;
  }
  .fld-row { display: flex; gap: 10px; }
  .fld-row .fld { flex: 1; min-width: 0; }
  .auto-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .auto-hint b { color: var(--dark); }

  /* TOOL TABLE */
  .tool-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .tool-table thead th {
    background: var(--section-bg); padding: 8px 6px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    color: var(--label); text-align: left; border-bottom: 2px solid #ddd;
  }
  .tool-table thead th:first-child { border-left: 3px solid var(--orange); padding-left: 10px; }
  .tool-table tbody tr { border-bottom: 1px solid #f0f0f0; }
  .tool-table tbody tr:last-child { border-bottom: none; }
  .tool-table td { padding: 6px 4px; vertical-align: middle; }
  .tool-table td:first-child { padding-left: 10px; }

  .t-num { width: 28px; font-size: 12px; font-weight: 700; color: var(--muted); text-align: center; }
  .t-model input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 9px 8px; font-size: 14px; font-family: inherit; background: var(--input-bg); outline: none; }
  .t-model input:focus { border-color: var(--orange); }
  .t-power { width: 100px; }
  .pw { display: flex; gap: 4px; }
  .pw-btn {
    flex: 1; padding: 8px 4px; text-align: center; border: 1.5px solid #ddd;
    background: var(--white); border-radius: 6px; font-size: 12px; font-weight: 700;
    cursor: pointer; color: var(--muted); user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .pw-btn.corded.on { background: #eaf0f8; border-color: var(--blue); color: var(--blue); }
  .pw-btn.battery.on { background: #eaf5ee; border-color: var(--green); color: var(--green); }
  .t-tag input, .t-plant input {
    width: 100%; border: 1px solid #ddd; border-radius: 6px;
    padding: 9px 8px; font-size: 14px; font-family: inherit;
    background: var(--input-bg); outline: none;
  }
  .t-tag input:focus, .t-plant input:focus { border-color: var(--orange); }
  .t-tag { width: 100px; }
  .t-plant { width: 72px; }
  .t-del { width: 34px; text-align: center; }
  .t-del button {
    background: transparent; border: 1px solid #e8bcba; color: var(--red);
    border-radius: 6px; width: 28px; height: 28px; font-size: 16px;
    cursor: pointer; line-height: 1; padding: 0;
  }

  .add-row-btn {
    width: 100%; background: transparent; color: var(--orange);
    border: 1px dashed var(--orange); padding: 11px; border-radius: 8px;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 10px;
  }

  .btn-email {
    display: flex; width: 100%; background: var(--green); color: var(--white);
    border: none; padding: 16px; border-radius: 12px;
    font-size: 16px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-top: 10px;
    align-items: center; justify-content: center; gap: 8px;
  }
  .btn-email:active { opacity: .85; }
  .btn-email svg { width: 20px; height: 20px; fill: white; }
  .btn-secondary { display: block; width: 100%; background: var(--orange); color: var(--white); border: none; padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; }
  .btn-outline { display: block; width: 100%; background: var(--white); color: var(--dark); border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; }

  .status { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; display: none; }
  .status.ok { background: #eaf5ee; color: var(--green); border: 1px solid #bfe0cc; display: block; }
  .status.err { background: #fcebea; color: var(--red); border: 1px solid #e8bcba; display: block; }

  .footer { display:flex; justify-content:space-between; margin-top:14px; padding:10px 0; font-size:11px; color:var(--muted); }

  @media(max-width:520px) {
    .t-power { width: 80px; }
    .t-tag { width: 80px; }
    .t-plant { width: 60px; }
    .fld-row { flex-direction: column; gap: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-top">
      <div class="logo-b"><span>B</span></div>
      <div class="logo-txt">arzen<small>P r o j e c t s</small></div>
    </div>
    <h1>Test &amp; Tag Register</h1>
    <div class="hdr-meta">Form BP-ELEC-F01 | Rev 2</div>
  </div>

  <!-- JOB -->
  <div class="card">
    <div class="card-hd">Job</div>
    <div class="card-bd">
      <div class="fld">
        <span class="fld-lbl">JOB</span>
        <select class="fld-input" id="fJob" onchange="applyJob()">
          <option value="">Select job...</option>
        </select>
        <div class="auto-hint" id="jobHint"></div>
      </div>
      <div class="fld-row">
        <div class="fld"><span class="fld-lbl">DATE</span><input type="date" class="fld-input" id="fDate"></div>
        <div class="fld"><span class="fld-lbl">SITE MANAGER</span>
          <select class="fld-input" id="fSm"><option value="">Select...</option></select>
        </div>
      </div>
    </div>
  </div>

  <!-- TESTING DETAILS -->
  <div class="card">
    <div class="card-hd">Testing details</div>
    <div class="card-bd">
      <div class="fld-row">
        <div class="fld">
          <span class="fld-lbl">TESTING / COMPANY NAME</span>
          <input type="text" class="fld-input" id="fCompany" placeholder="e.g. M Squared Electrical" list="companies">
          <datalist id="companies"><option value="M Squared Electrical"></option></datalist>
        </div>
        <div class="fld" style="max-width:160px">
          <span class="fld-lbl">CERT / LICENCE NO.</span>
          <input type="text" class="fld-input" id="fLic" placeholder="e.g. 23899">
        </div>
      </div>
    </div>
  </div>

  <!-- TOOLS TABLE -->
  <div class="card">
    <div class="card-hd">Tools tested</div>
    <div class="card-bd" style="padding:0 0 12px 0; overflow-x:auto;">
      <table class="tool-table" id="toolTable">
        <thead>
          <tr>
            <th class="t-num">#</th>
            <th class="t-model">Tool make and model</th>
            <th class="t-power">Power</th>
            <th class="t-tag">Tag no.</th>
            <th class="t-plant">Plant no.</th>
            <th class="t-del"></th>
          </tr>
        </thead>
        <tbody id="toolBody"></tbody>
      </table>
      <div style="padding:0 14px">
        <button class="add-row-btn" onclick="addRow()">+ Add tool</button>
      </div>
    </div>
  </div>

  <!-- SEND -->
  <div class="card">
    <div class="card-hd">Send</div>
    <div class="card-bd">
      <div class="fld"><span class="fld-lbl">SEND TO (BUILDER)</span><input type="email" class="fld-input" id="fToEmail" placeholder="Auto-filled from job"></div>
      <div class="fld"><span class="fld-lbl">CC</span><input type="text" class="fld-input" id="fCcEmail" value="cal@barzenprojects.com.au, admin@barzenprojects.com.au"></div>
    </div>
  </div>

  <button class="btn-email" onclick="generateAndSend()">
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    Generate PDF &amp; Email
  </button>
  <button class="btn-secondary" onclick="generateAndDownload()">Download PDF Only</button>
  <button class="btn-outline" onclick="previewPDF()">Preview PDF</button>
  <div id="status" class="status"></div>

  <div class="footer"><span>Barzen Projects</span><span>BP-ELEC-F01 | Rev 2</span></div>
</div>

<script>
var JOBS = [
  {code:'BC04',   name:'Candela',                builder:'Ironside', site:'40 Upper Heidelberg Road, Ivanhoe, VIC',              mgr:'Adam Coulter',    to:'m.lagreca@ironside.com.au',     cc:'o.tulloch@ironside.com.au'},
  {code:'BP1023', name:'Richmond East (Fortis)', builder:'Hacer',    site:'2-8 Brighton Street, Richmond VIC',                   mgr:'Rhys Smith',      to:'cchisholm@hacer.com.au',        cc:'AHarriss@hacer.com.au'},
  {code:'BP1024', name:'IGLU',                   builder:'Kane',     site:'360 William Street, Melbourne VIC 3000',              mgr:'Rikki Brownrigg', to:'nmartin@kane.com.au',           cc:'PMunro@kane.com.au'},
  {code:'BP1025', name:'The Canopy',             builder:'Crema',    site:'272 Normanby Road, South Melbourne VIC 3205',         mgr:'Michael Maugeri', to:'buds.beluli@crema.com.au',      cc:'austin.kwon@crema.com.au'},
  {code:'BP1033', name:'Trielle Tower 9',        builder:'Mirvac',   site:'118-122 South Wharf Drive, Docklands VIC 3008',       mgr:'Conan Ross',      to:'ben.bailey@mirvac.com',         cc:'jack.royle@mirvac.com'},
  {code:'BP1034', name:'NEL — NVS',              builder:'Spark',    site:'Northern Ventilation Structure, Yallambie VIC 3085',  mgr:'Adam Coulter',    to:'Kedi.Dong@sparknel-dc.com.au',  cc:'Hayley.Catherine@sparknel-dc.com.au'},
  {code:'BP1036', name:'NEL — SVS',              builder:'Spark',    site:'162-168 Bulleen Road, Bulleen VIC 3105',              mgr:'Adam Coulter',    to:'david.oshea@sparknel-dc.com.au',cc:'Hayley.Catherine@sparknel-dc.com.au'},
  {code:'BP1037', name:'Jam Factory Stage 1',    builder:'Crema',    site:'500 Chapel Street, South Yarra VIC 3141',             mgr:'Michael Maugeri', to:'huw.richardson@crema.com.au',   cc:'nathan.katona@crema.com.au'},
  {code:'BQ02',   name:'Tannum Sands',           builder:'Paynters', site:'75 Tannum Sands Road, Tannum Sands QLD',              mgr:'Declan Mc Atee',  to:'shane.godbold@paynters.com.au', cc:'brenton.tovey@paynters.com.au'}
];
var STAFF = [
  'Rhys Smith','Jarrad Cootee','Conan Ross','George Sahindis',
  'Jack Burke','Joshua Groves','Rikki Brownrigg','Adam Coulter',
  'Chang Lin Wong','Kheng Sin Eh Dam','WeiJin Ng','Declan Mc Atee',
  'Joel Easson','Michael Jones','Cheng (Jasper) Liu',
  'Gareth Porter','Shitao Yang','Peter Sheehan','Michael Maugeri',
  'Thomas Sheehan','Macauley Braithwaite','Boshi (Scotty) Liu',
  'Ryan Lewis'
];

function populateJobs() {
  var sel = document.getElementById('fJob');
  JOBS.forEach(function(j) {
    var o = document.createElement('option');
    o.value = j.code; o.textContent = j.code + ' — ' + j.name;
    sel.appendChild(o);
  });
}
function populateStaff() {
  var sel = document.getElementById('fSm');
  STAFF.forEach(function(s) {
    var o = document.createElement('option'); o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}
function applyJob() {
  var code = document.getElementById('fJob').value;
  var j = JOBS.find(function(x){ return x.code === code; });
  if (!j) { document.getElementById('jobHint').innerHTML = ''; return; }
  document.getElementById('jobHint').innerHTML = '<b>' + j.builder + '</b> — ' + j.site;
  document.getElementById('fToEmail').value = j.to || '';
  var sm = document.getElementById('fSm');
  var match = Array.prototype.slice.call(sm.options).find(function(o){ return o.value === j.mgr; });
  if (match) sm.value = j.mgr;
}

/* TOOL ROWS */
var rowSeq = 0;
function addRow() {
  rowSeq++;
  var n = rowSeq;
  var tbody = document.getElementById('toolBody');
  var tr = document.createElement('tr');
  tr.id = 'row' + n;
  tr.innerHTML =
    '<td class="t-num">' + document.querySelectorAll('#toolBody tr').length + 1 + '</td>'
    + '<td class="t-model"><input type="text" placeholder="e.g. Makita Charger"></td>'
    + '<td class="t-power"><div class="pw">'
        + '<div class="pw-btn corded" data-val="Corded">C</div>'
        + '<div class="pw-btn battery" data-val="Battery">B</div>'
      + '</div><input type="hidden" class="i-power" value=""></td>'
    + '<td class="t-tag"><input type="text" inputmode="numeric" placeholder="101533"></td>'
    + '<td class="t-plant"><input type="text" placeholder="1"></td>'
    + '<td class="t-del"><button type="button" onclick="removeRow(this)" title="Remove">×</button></td>';
  tbody.appendChild(tr);

  tr.querySelectorAll('.pw-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tr.querySelectorAll('.pw-btn').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on');
      tr.querySelector('.i-power').value = btn.dataset.val;
    });
  });
}
function removeRow(btn) {
  var tr = btn.closest('tr');
  tr.remove();
  renumberRows();
}
function renumberRows() {
  document.querySelectorAll('#toolBody tr').forEach(function(tr, i) {
    tr.querySelector('.t-num').textContent = i + 1;
  });
}

populateJobs();
populateStaff();
document.getElementById('fDate').valueAsDate = new Date();
for (var i = 0; i < 5; i++) addRow();

/* PDF */
function v(id) { return (document.getElementById(id).value || '').trim(); }
function jobObj() { return JOBS.find(function(x){ return x.code === v('fJob'); }); }

function getRows() {
  var rows = [];
  document.querySelectorAll('#toolBody tr').forEach(function(tr, i) {
    var model = tr.querySelector('.t-model input').value.trim();
    var power = tr.querySelector('.i-power').value;
    var tag   = tr.querySelector('.t-tag input').value.trim();
    var plant = tr.querySelector('.t-plant input').value.trim();
    if (model || tag) rows.push({num: i+1, model: model, power: power, tag: tag, plant: plant});
  });
  return rows;
}

function buildPDF() {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({unit:'mm', format:'a4'});
  var pageW = 210, margin = 14, cw = pageW - margin * 2;
  var y = margin;

  // Header stripe
  doc.setFillColor(232,132,44); doc.rect(0,0,pageW,3,'F');
  // Logo
  doc.setFillColor(58,58,58); doc.rect(margin, y, 10, 11, 'F');
  doc.setFont('helvetica','bold'); doc.setTextColor(232,132,44); doc.setFontSize(14);
  doc.text('B', margin+2.8, y+8.3);
  doc.setTextColor(58,58,58); doc.setFontSize(16); doc.text('arzen', margin+11, y+7);
  doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(120,120,120);
  doc.text('P R O J E C T S', margin+11, y+10);
  doc.setFontSize(8); doc.setTextColor(90,90,90);
  doc.text('BP-ELEC-F01 | Rev 2', pageW-margin, y+5, {align:'right'});
  doc.text('Controlled form', pageW-margin, y+9, {align:'right'});

  y += 14;
  doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30); doc.setFontSize(15);
  doc.text('Test & Tag Register', margin, y);
  y += 5;
  doc.setDrawColor(232,132,44); doc.setLineWidth(0.4); doc.line(margin, y, pageW-margin, y);
  y += 6;

  // Job details block
  var j = jobObj();
  var col = cw / 2;
  function lbl(label, val, x, w) {
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(90,90,90);
    doc.text(label.toUpperCase(), x, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(30,30,30);
    var lines = doc.splitTextToSize(val || '—', w);
    doc.text(lines, x, y+3.8);
    return lines.length;
  }
  lbl('Job code', v('fJob'), margin, col-4);
  lbl('Project', j ? j.name : '', margin+col, col-4);
  y += 9;
  lbl('Builder', j ? j.builder : '', margin, col-4);
  lbl('Site', j ? j.site : '', margin+col, col-4);
  y += 9;
  var col3 = cw / 3;
  lbl('Date', v('fDate'), margin, col3-4);
  lbl('Site manager', v('fSm'), margin+col3, col3-4);
  lbl('Testing company', v('fCompany'), margin+col3*2, col3-4);
  y += 9;
  lbl('Cert / Licence no.', v('fLic'), margin, col-4);
  y += 9;

  doc.setDrawColor(200,200,200); doc.setLineWidth(0.2); doc.line(margin, y, pageW-margin, y);
  y += 5;

  // Table header
  var cols = {
    num:   { x: margin,      w: 8  },
    model: { x: margin+9,    w: 72 },
    power: { x: margin+82,   w: 20 },
    tag:   { x: margin+103,  w: 40 },
    plant: { x: margin+144,  w: 38 }
  };
  doc.setFillColor(238,238,238); doc.rect(margin, y-3.5, cw, 7, 'F');
  doc.setFillColor(232,132,44); doc.rect(margin, y-3.5, 1.2, 7, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(90,90,90);
  doc.text('#',                    cols.num.x+1,   y+0.8);
  doc.text('TOOL MAKE AND MODEL',  cols.model.x,   y+0.8);
  doc.text('CORDED/BATT',          cols.power.x,   y+0.8);
  doc.text('TAG NO.',              cols.tag.x,     y+0.8);
  doc.text('PLANT NO.',            cols.plant.x,   y+0.8);
  y += 7;

  // Rows
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(30,30,30);
  var rows = getRows();
  rows.forEach(function(r) {
    if (y > 275) { doc.addPage(); y = margin; }
    var mLines = doc.splitTextToSize(r.model || '—', cols.model.w);
    var rowH = Math.max(6, mLines.length * 4.5);
    var mid = y + rowH/2 - 0.5;

    doc.text(String(r.num), cols.num.x+1, mid);
    doc.text(mLines, cols.model.x, y + 4);

    // Power indicator
    if (r.power) {
      doc.setFont('helvetica','bold');
      if (r.power === 'Corded')  { doc.setTextColor(36,73,122);  doc.text('Corded',  cols.power.x, mid); }
      if (r.power === 'Battery') { doc.setTextColor(26,107,63);  doc.text('Battery', cols.power.x, mid); }
      doc.setTextColor(30,30,30); doc.setFont('helvetica','normal');
    } else {
      doc.setTextColor(180,180,180); doc.text('—', cols.power.x, mid); doc.setTextColor(30,30,30);
    }

    doc.text(r.tag   || '—', cols.tag.x,   mid);
    doc.text(r.plant || '—', cols.plant.x, mid);
    doc.setDrawColor(220,220,220); doc.line(margin, y+rowH, pageW-margin, y+rowH);
    y += rowH;
  });

  if (!rows.length) {
    doc.setTextColor(140,140,140); doc.text('(No items recorded)', cols.model.x, y+4);
    y += 8; doc.setTextColor(30,30,30);
  }

  y += 3;
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(90,90,90);
  doc.text('Total items: ' + rows.length, margin, y);

  // Footer on all pages
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setDrawColor(232,132,44); doc.setLineWidth(0.3);
    doc.line(margin, 287, pageW-margin, 287);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(120,120,120);
    doc.text('Barzen Projects — Controlled form', margin, 291);
    doc.text('BP-ELEC-F01 | Rev 2', pageW/2, 291, {align:'center'});
    doc.text('Page ' + p + ' of ' + pages, pageW-margin, 291, {align:'right'});
  }
  return doc;
}

function buildFilename() {
  return 'Test_and_Tag_' + (v('fJob') || 'NoJob') + '_' + (v('fDate') || new Date().toISOString().slice(0,10)) + '.pdf';
}
function setStatus(msg, kind) {
  var s = document.getElementById('status');
  s.className = 'status ' + (kind || 'ok');
  s.textContent = msg;
}

async function generateAndSend() {
  try {
    var to = v('fToEmail');
    if (!to) { setStatus('No builder email set. Pick a job or enter manually.', 'err'); return; }
    var cc = v('fCcEmail');
    var doc = buildPDF(); var filename = buildFilename();
    var j = jobObj();

    var subject = 'Test & Tag — ' + (v('fJob')||'') + ' ' + (j ? j.name : '') + ' — ' + (v('fDate')||'');
    var emailBody = 'Please find attached the completed Test & Tag register.\n\n'
      + 'Job: ' + (v('fJob')||'—') + (j ? ' — '+j.name : '') + '\n'
      + 'Date: ' + (v('fDate')||'—') + '\n'
      + 'Testing company: ' + (v('fCompany')||'—') + '\n'
      + 'Cert/Licence: ' + (v('fLic')||'—') + '\n\n'
      + 'Regards,\nBarzen Projects';

    // Extract base64 from jsPDF output
    var pdfBase64 = doc.output('datauristring').split(',')[1];

    setStatus('Sending email with PDF attached...', 'ok');

    var payload = {
      form_type: 'test_and_tag',
      job_code: v('fJob') || null,
      submitted_by: v('fTester') || null,
      data: {
        job_code: v('fJob'),
        job_name: j ? j.name : null,
        date: v('fDate'),
        company: v('fCompany'),
        licence: v('fLic'),
        items: window._tagItems || [],
      },
      email: {
        to: to,
        cc: cc || '',
        subject: subject,
        body: emailBody,
        pdf_base64: pdfBase64,
        pdf_filename: filename,
      }
    };

    var res = await fetch('https://trade-control-ten.vercel.app/api/forms/site-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      setStatus('Email sent with PDF attached.', 'ok');
    } else {
      // Fallback: download PDF + open mailto if API fails
      console.error('API send failed — falling back to mailto');
      doc.save(filename);
      var ccEncoded = cc ? cc.split(',').map(function(e){ return encodeURIComponent(e.trim()); }).join(',') : '';
      var href = 'mailto:' + encodeURIComponent(to) + (ccEncoded?'?cc='+ccEncoded+'&':'?')
        + 'subject=' + encodeURIComponent(subject)
        + '&body=' + encodeURIComponent(emailBody+'\n\n[PDF downloaded — please attach "'+filename+'" before sending.]');
      var a = document.createElement('a');
      a.href = href; a.style.display = 'none';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setStatus('API unavailable — PDF downloaded. Attach it to the email manually.', 'err');
    }
  } catch(err) { console.error(err); setStatus('Error: '+err.message, 'err'); }
}
function generateAndDownload() {
  try { buildPDF().save(buildFilename()); setStatus('PDF downloaded.', 'ok'); }
  catch(err) { console.error(err); setStatus('Error: '+err.message, 'err'); }
}
function previewPDF() {
  try { window.open(buildPDF().output('bloburl'), '_blank'); }
  catch(err) { console.error(err); setStatus('Error: '+err.message, 'err'); }
}
</script>
