<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>Test &amp; Tag — Barzen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --orange: #e8842c;
    --dark: #3a3a3a;
    --label: #444;
    --muted: #666;
    --input-bg: #f5f5f5;
    --border: #ccc;
    --section-bg: #eee;
    --white: #fff;
    --green: #1a6b3f;
    --red: #c62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: #f0f0f0;
    color: var(--dark);
    -webkit-text-size-adjust: 100%;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  .page { max-width: 640px; margin: 0 auto; padding: 10px; }

  .hdr {
    background: var(--white);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    border-top: 4px solid var(--orange);
  }
  .hdr-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .logo-b { width: 40px; height: 44px; background: var(--dark); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-b span { font-size: 30px; font-weight: 800; color: var(--orange); font-family: Arial; }
  .logo-txt { font-size: 22px; font-weight: 800; color: var(--dark); font-family: Arial; }
  .logo-txt small { display: block; font-size: 10px; font-weight: 400; letter-spacing: 5px; color: var(--muted); }
  .hdr h1 { font-size: 20px; font-weight: 700; }
  .hdr-meta { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.7; }

  .card { background: var(--white); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .card-hd {
    background: var(--section-bg); padding: 12px 16px;
    border-left: 4px solid var(--orange);
    font-size: 15px; font-weight: 700;
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-hd .hd-count { font-size: 12px; color: var(--muted); font-weight: 600; }
  .card-bd { padding: 14px 16px; }

  .fld { margin-bottom: 14px; }
  .fld-lbl { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--label); letter-spacing: .3px; margin-bottom: 6px; display: block; }
  .fld-input {
    width: 100%; background: var(--input-bg); border: 1px solid #ddd; border-radius: 8px;
    padding: 14px 12px; font-size: 16px; font-family: inherit; color: var(--dark);
    outline: none; -webkit-appearance: none; appearance: none;
  }
  .fld-input:focus { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(232,132,44,.2); }
  select.fld-input {
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='7' viewBox='0 0 12 7' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23666' fill='none' stroke-width='2'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px;
  }
  .fld-row { display: flex; gap: 10px; }
  .fld-row .fld { flex: 1; min-width: 0; }
  .auto-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .auto-hint b { color: var(--dark); }

  .item {
    border: 1px solid #e0e0e0; border-radius: 10px;
    padding: 14px; margin-bottom: 12px; background: #fafafa;
  }
  .item-hd {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #e0e0e0;
  }
  .item-hd h3 { font-size: 16px; font-weight: 700; }
  .item-del {
    background: transparent; border: 1px solid #d9a7a5; color: var(--red);
    padding: 4px 10px; border-radius: 6px; font-size: 12px; font-family: inherit;
    font-weight: 600; cursor: pointer;
  }
  .pw { display: flex; gap: 6px; margin-top: 6px; }
  .pw-btn {
    flex: 1; padding: 12px 6px; text-align: center; border: 1.5px solid #ddd;
    background: var(--white); border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; color: var(--muted); user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .pw-btn.corded.on { background: #eaf0f8; border-color: #35618d; color: #24497a; }
  .pw-btn.battery.on { background: #eaf5ee; border-color: var(--green); color: var(--green); }

  .add-row-btn {
    width: 100%; background: transparent; color: var(--orange);
    border: 1px dashed var(--orange); padding: 12px; border-radius: 8px;
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    margin-top: 6px;
  }

  .btn-email {
    display: flex; width: 100%; background: var(--green); color: var(--white);
    border: none; padding: 18px; border-radius: 12px;
    font-size: 17px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-top: 10px;
    align-items: center; justify-content: center; gap: 8px;
  }
  .btn-email:active { opacity: .85; }
  .btn-email svg { width: 22px; height: 22px; fill: white; }
  .btn-secondary { display: block; width: 100%; background: var(--orange); color: var(--white); border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; }
  .btn-outline { display: block; width: 100%; background: var(--white); color: var(--dark); border: 1px solid var(--border); padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; }

  .status { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; display: none; }
  .status.ok { background: #eaf5ee; color: var(--green); border: 1px solid #bfe0cc; display: block; }
  .status.err { background: #fcebea; color: var(--red); border: 1px solid #e8bcba; display: block; }

  .footer { display:flex; justify-content:space-between; margin-top:14px; padding:10px 0; font-size:11px; color:var(--muted); }

  @media(max-width:480px) { .fld-row { flex-direction: column; gap: 0; } }
</style>
</head>
<body>

<div class="page">

  <div class="hdr">
    <div class="hdr-top">
      <div class="logo-b"><span>B</span></div>
      <div class="logo-txt">arzen<small>P r o j e c t s</small></div>
    </div>
    <h1>Test &amp; Tag Register</h1>
    <div class="hdr-meta">Form BP-ELEC-F01 | Rev 2 — Record of tools tested on site.</div>
  </div>

  <div class="card">
    <div class="card-hd">1. Job</div>
    <div class="card-bd">
      <div class="fld">
        <span class="fld-lbl">JOB</span>
        <select class="fld-input" id="fJob" onchange="applyJob()">
          <option value="">Select job...</option>
        </select>
        <div class="auto-hint" id="jobHint"></div>
      </div>
      <div class="fld-row">
        <div class="fld"><span class="fld-lbl">DATE</span><input type="date" class="fld-input" id="fDate"></div>
        <div class="fld">
          <span class="fld-lbl">SITE MANAGER</span>
          <select class="fld-input" id="fSm">
            <option value="">Select...</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">2. Testing details</div>
    <div class="card-bd">
      <div class="fld"><span class="fld-lbl">TESTING / COMPANY NAME</span>
        <input type="text" class="fld-input" id="fCompany" placeholder="e.g. M Squared Electrical" list="companies">
        <datalist id="companies">
          <option value="M Squared Electrical"></option>
        </datalist>
      </div>
      <div class="fld"><span class="fld-lbl">CERT / LICENCE NUMBER</span>
        <input type="text" class="fld-input" id="fLic" placeholder="e.g. 23899">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">3. Tools tested <span class="hd-count" id="itemCount">0 items</span></div>
    <div class="card-bd">
      <div id="itemList"></div>
      <button class="add-row-btn" onclick="addItem()">+ Add tool</button>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">4. Send</div>
    <div class="card-bd">
      <div class="fld"><span class="fld-lbl">SEND TO (BUILDER)</span><input type="email" class="fld-input" id="fToEmail" placeholder="Auto-filled from job"></div>
      <div class="fld"><span class="fld-lbl">CC</span><input type="email" class="fld-input" id="fCcEmail" value="cal@barzenprojects.com.au"></div>
    </div>
  </div>

  <button class="btn-email" onclick="generateAndSend()">
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    Generate PDF &amp; Email
  </button>
  <button class="btn-secondary" onclick="generateAndDownload()">Download PDF Only</button>
  <button class="btn-outline" onclick="previewPDF()">Preview PDF</button>
  <div id="status" class="status"></div>

  <div class="footer"><span>Barzen Projects</span><span>BP-ELEC-F01 | Rev 2</span></div>
</div>

<script>
/* ---- DATA ---- */
var JOBS = [
  {code:'BC04',   name:'Candela',                 builder:'Ironside', site:'40 Upper Heidelberg Road, Ivanhoe, VIC',                       mgr:'Adam Coulter',    to:'m.lagreca@ironside.com.au',     cc:'o.tulloch@ironside.com.au'},
  {code:'BP1023', name:'Richmond East (Fortis)',  builder:'Hacer',    site:'2-8 Brighton Street, Richmond VIC',                            mgr:'Rhys Smith',      to:'cchisholm@hacer.com.au',        cc:'AHarriss@hacer.com.au'},
  {code:'BP1024', name:'IGLU',                    builder:'Kane',     site:'360 William Street, Melbourne VIC 3000',                       mgr:'Rikki Brownrigg', to:'nmartin@kane.com.au',           cc:'PMunro@kane.com.au'},
  {code:'BP1025', name:'The Canopy',              builder:'Crema',    site:'272 Normanby Road, South Melbourne VIC 3205',                  mgr:'Michael Maugeri', to:'buds.beluli@crema.com.au',      cc:'austin.kwon@crema.com.au'},
  {code:'BP1033', name:'Trielle Tower 9',         builder:'Mirvac',   site:'118-122 South Wharf Drive, Docklands VIC 3008',                mgr:'Conan Ross',      to:'ben.bailey@mirvac.com',         cc:'jack.royle@mirvac.com'},
  {code:'BP1034', name:'NEL — NVS',               builder:'Spark',    site:'Northern Ventilation Structure, Yallambie VIC 3085',           mgr:'Adam Coulter',    to:'Kedi.Dong@sparknel-dc.com.au',  cc:'Hayley.Catherine@sparknel-dc.com.au'},
  {code:'BP1036', name:'NEL — SVS',               builder:'Spark',    site:'162-168 Bulleen Road, Bulleen VIC 3105',                       mgr:'Adam Coulter',    to:'david.oshea@sparknel-dc.com.au',cc:'Hayley.Catherine@sparknel-dc.com.au'},
  {code:'BP1037', name:'Jam Factory Stage 1',     builder:'Crema',    site:'500 Chapel Street, South Yarra VIC 3141',                      mgr:'Michael Maugeri', to:'huw.richardson@crema.com.au',   cc:'nathan.katona@crema.com.au'},
  {code:'BQ02',   name:'Tannum Sands',            builder:'Paynters', site:'75 Tannum Sands Road, Tannum Sands QLD',                       mgr:'Declan Mc Atee',  to:'shane.godbold@paynters.com.au', cc:'brenton.tovey@paynters.com.au'}
];
var STAFF = [
  'Cal Crane','Ethan Barzen','Michelle',
  'Rhys Smith','Jarrad Cootee','Conan Ross','George Sahindis',
  'Jack Burke','Joshua Groves','Rikki Brownrigg','Adam Coulter',
  'Chang Lin Wong','Kheng Sin Eh Dam','WeiJin Ng','Declan Mc Atee',
  'Joel Easson','Michael Jones','Ryan Lewis','Cheng (Jasper) Liu',
  'Gareth Porter','Shitao Yang','Peter Sheehan','Michael Maugeri',
  'Thomas Sheehan','Macauley Braithwaite','Boshi (Scotty) Liu'
];

function populateJobs() {
  var sel = document.getElementById('fJob');
  JOBS.forEach(function(j) {
    var o = document.createElement('option');
    o.value = j.code; o.textContent = j.code + ' — ' + j.name;
    sel.appendChild(o);
  });
}
function populateStaff(sel) {
  STAFF.forEach(function(s) {
    var o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

function applyJob() {
  var code = document.getElementById('fJob').value;
  var j = JOBS.find(function(x){ return x.code === code; });
  if (!j) { document.getElementById('jobHint').innerHTML = ''; return; }
  document.getElementById('jobHint').innerHTML = '<b>' + j.builder + '</b> — ' + j.site;
  document.getElementById('fToEmail').value = j.to || '';
  var sm = document.getElementById('fSm');
  var match = Array.prototype.slice.call(sm.options).find(function(o){ return o.value === j.mgr; });
  if (match) sm.value = j.mgr;
}

/* ---- ITEMS ---- */
var itemSeq = 0;
function addItem() {
  itemSeq++;
  var c = document.getElementById('itemList');
  var div = document.createElement('div');
  div.className = 'item';
  div.innerHTML =
    '<div class="item-hd">'
    + '<h3>Item <span class="num">' + itemSeq + '</span></h3>'
    + '<button class="item-del" type="button">Remove</button>'
    + '</div>'
    + '<div class="fld"><span class="fld-lbl">TOOL MAKE AND MODEL</span>'
    + '<input type="text" class="fld-input i-model" placeholder="e.g. Makita Charger"></div>'
    + '<div class="fld"><span class="fld-lbl">POWER TYPE</span>'
      + '<div class="pw">'
        + '<div class="pw-btn corded" data-val="Corded">Corded</div>'
        + '<div class="pw-btn battery" data-val="Battery">Battery</div>'
      + '</div>'
      + '<input type="hidden" class="i-power" value="">'
    + '</div>'
    + '<div class="fld-row">'
      + '<div class="fld"><span class="fld-lbl">TAG NUMBER</span><input type="text" class="fld-input i-tag" inputmode="numeric" placeholder="e.g. 101533"></div>'
      + '<div class="fld"><span class="fld-lbl">PLANT NO. / ITEM</span><input type="text" class="fld-input i-plant" placeholder="e.g. 1"></div>'
    + '</div>';
  c.appendChild(div);

  div.querySelectorAll('.pw-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      div.querySelectorAll('.pw-btn').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on');
      div.querySelector('.i-power').value = btn.dataset.val;
    });
  });
  div.querySelector('.item-del').addEventListener('click', function() {
    if (confirm('Remove this item?')) { div.remove(); renumber(); up(); }
  });
  up();
}
function renumber() {
  var n = 0;
  document.querySelectorAll('#itemList .item').forEach(function(it) {
    n++; it.querySelector('.num').textContent = n;
  });
}
function up() {
  var total = document.querySelectorAll('#itemList .item').length;
  document.getElementById('itemCount').textContent = total + ' item' + (total === 1 ? '' : 's');
}

populateJobs();
populateStaff(document.getElementById('fSm'));
for (var i = 0; i < 3; i++) addItem();
document.getElementById('fDate').valueAsDate = new Date();

/* ---- PDF GENERATION ---- */
function v(id) { return (document.getElementById(id).value || '').trim(); }
function jobObj() { return JOBS.find(function(x){ return x.code === v('fJob'); }); }

function buildPDF() {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({unit:'mm', format:'a4'});
  var pageW = 210, margin = 14;
  var y = margin;

  doc.setFillColor(232,132,44); doc.rect(0,0,pageW,3,'F');
  doc.setFillColor(58,58,58); doc.rect(margin, y, 10, 11, 'F');
  doc.setFont('helvetica','bold'); doc.setTextColor(232,132,44); doc.setFontSize(14); doc.text('B', margin+2.8, y+8.3);
  doc.setTextColor(58,58,58); doc.setFontSize(16); doc.text('arzen', margin+11, y+7);
  doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(120,120,120); doc.text('P R O J E C T S', margin+11, y+10);
  doc.setFontSize(8); doc.setTextColor(90,90,90);
  doc.text('BP-ELEC-F01 | Rev 2', pageW-margin, y+5, {align:'right'});
  doc.text('Controlled form', pageW-margin, y+9, {align:'right'});

  y += 14;
  doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30); doc.setFontSize(15);
  doc.text('Test & Tag Register', margin, y);
  y += 5;
  doc.setDrawColor(232,132,44); doc.setLineWidth(0.4); doc.line(margin, y, pageW-margin, y);
  y += 5;

  function secHdr(num, title) {
    if (y > 265) { doc.addPage(); y = margin; }
    doc.setFillColor(238,238,238); doc.rect(margin, y-3.5, pageW-margin*2, 7, 'F');
    doc.setFillColor(232,132,44); doc.rect(margin, y-3.5, 1.2, 7, 'F');
    doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30); doc.setFontSize(10);
    doc.text(num + '. ' + title, margin+3, y+1.2);
    y += 7;
  }
  function lbl(label, val, x, width) {
    doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(90,90,90);
    doc.text((label||'').toUpperCase(), x, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(30,30,30);
    var lines = doc.splitTextToSize(val || '—', width);
    doc.text(lines, x, y+3.8);
    return lines.length;
  }
  function checkPage(need){ if (y + need > 285) { doc.addPage(); y = margin; } }

  // SECTION 1 - Job
  secHdr(1, 'Job and details');
  var j = jobObj();
  var col = (pageW - margin*2) / 2;
  lbl('Job code', v('fJob'), margin, col-2);
  lbl('Project', j ? j.name : '', margin+col, col-2);
  y += 9;
  lbl('Builder', j ? j.builder : '', margin, col-2);
  lbl('Site', j ? j.site : '', margin+col, col-2);
  y += 10;
  lbl('Date', v('fDate'), margin, col-2);
  lbl('Site manager', v('fSm'), margin+col, col-2);
  y += 10;
  lbl('Testing company', v('fCompany'), margin, col-2);
  lbl('Cert / Licence no.', v('fLic'), margin+col, col-2);
  y += 10;

  // SECTION 2 - Tools tested table
  checkPage(30);
  secHdr(2, 'Tools tested');
  var colX = {
    num: margin+1,
    model: margin+8,
    corded: margin+78,
    battery: margin+95,
    tag: margin+115,
    plant: margin+150,
    end: pageW-margin
  };
  doc.setFillColor(245,245,245); doc.rect(margin, y-3, pageW-margin*2, 6, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(90,90,90);
  doc.text('#', colX.num, y+0.8);
  doc.text('TOOL MAKE AND MODEL', colX.model, y+0.8);
  doc.text('CORDED', colX.corded, y+0.8);
  doc.text('BATTERY', colX.battery, y+0.8);
  doc.text('TAG NO.', colX.tag, y+0.8);
  doc.text('PLANT/ITEM', colX.plant, y+0.8);
  y += 5;

  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(30,30,30);
  var ix = 0, any = false;
  document.querySelectorAll('#itemList .item').forEach(function(it) {
    var model = it.querySelector('.i-model').value;
    var power = it.querySelector('.i-power').value;
    var tag = it.querySelector('.i-tag').value;
    var plant = it.querySelector('.i-plant').value;
    if (!model && !tag) return;
    ix++; any = true;
    checkPage(10);
    doc.text(String(ix), colX.num, y+2.5);
    var mLines = doc.splitTextToSize(model || '—', 68);
    doc.text(mLines, colX.model, y+2.5);
    doc.setFont('helvetica','bold');
    if (power === 'Corded') { doc.setTextColor(36,73,122); doc.text('X', colX.corded+5, y+2.5); }
    else { doc.setTextColor(200,200,200); doc.text('—', colX.corded+5, y+2.5); }
    if (power === 'Battery') { doc.setTextColor(26,107,63); doc.text('X', colX.battery+5, y+2.5); }
    else { doc.setTextColor(200,200,200); doc.text('—', colX.battery+5, y+2.5); }
    doc.setTextColor(30,30,30); doc.setFont('helvetica','normal');
    doc.text(tag || '—', colX.tag, y+2.5);
    doc.text(plant || '—', colX.plant, y+2.5);
    var rowH = Math.max(6, mLines.length*4+2);
    doc.setDrawColor(220,220,220); doc.line(margin, y+rowH-0.5, pageW-margin, y+rowH-0.5);
    y += rowH;
  });
  if (!any) { doc.setTextColor(120,120,120); doc.text('(No items recorded)', colX.model, y+2.5); y += 6; doc.setTextColor(30,30,30); }

  y += 2;
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(90,90,90);
  doc.text('Total tools tested: ' + ix, margin, y);
  y += 6;

  // FOOTER
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setDrawColor(232,132,44); doc.setLineWidth(0.3);
    doc.line(margin, 287, pageW-margin, 287);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(120,120,120);
    doc.text('Barzen Projects — Controlled form', margin, 291);
    doc.text('BP-ELEC-F01 | Rev 2', pageW/2, 291, {align:'center'});
    doc.text('Page ' + p + ' of ' + pages, pageW-margin, 291, {align:'right'});
  }
  return doc;
}

function buildFilename() {
  var job = v('fJob') || 'NoJob';
  var date = v('fDate') || new Date().toISOString().slice(0,10);
  return 'Test_and_Tag_' + job + '_' + date + '.pdf';
}
function setStatus(msg, kind) {
  var s = document.getElementById('status');
  s.className = 'status ' + (kind || 'ok');
  s.textContent = msg;
}

async function generateAndSend() {
  try {
    var to = v('fToEmail');
    if (!to) { setStatus('No builder email set. Pick a job or enter manually.', 'err'); return; }
    var cc = v('fCcEmail');
    var doc = buildPDF();
    var filename = buildFilename();
    var blob = doc.output('blob');
    var file = new File([blob], filename, {type: 'application/pdf'});
    var j = jobObj();
    var subject = 'Test & Tag — ' + (v('fJob') || '') + ' ' + (j ? j.name : '') + ' — ' + (v('fDate') || '');
    var body = 'Please find attached the completed Test & Tag register.\n\n'
      + 'Job: ' + (v('fJob') || '—') + (j ? ' — ' + j.name : '') + '\n'
      + 'Date: ' + (v('fDate') || '—') + '\n'
      + 'Testing company: ' + (v('fCompany') || '—') + '\n'
      + 'Cert/Licence: ' + (v('fLic') || '—') + '\n\n'
      + 'Regards,\nBarzen Projects';

    if (navigator.canShare && navigator.canShare({files:[file]})) {
      try { await navigator.share({ files:[file], title: subject, text: body });
            setStatus('Shared. Confirm ' + to + (cc ? ' (CC ' + cc + ')' : '') + ' in email.', 'ok'); return;
      } catch (e) {}
    }
    doc.save(filename);
    var href = 'mailto:' + encodeURIComponent(to) + (cc ? '?cc=' + encodeURIComponent(cc) + '&' : '?') + 'subject=' + encodeURIComponent(subject)
      + '&body=' + encodeURIComponent(body + '\n\n[Attach the downloaded "' + filename + '" before sending.]');
    setTimeout(function(){ window.location.href = href; }, 400);
    setStatus('PDF downloaded. Email app opening — attach the PDF manually.', 'ok');
  } catch (err) { console.error(err); setStatus('Error: ' + err.message, 'err'); }
}
function generateAndDownload() {
  try { var doc = buildPDF(); doc.save(buildFilename()); setStatus('PDF downloaded.', 'ok'); }
  catch (err) { console.error(err); setStatus('Error: ' + err.message, 'err'); }
}
function previewPDF() {
  try { var doc = buildPDF(); window.open(doc.output('bloburl'), '_blank'); }
  catch (err) { console.error(err); setStatus('Error: ' + err.message, 'err'); }
}
</script>
</body>
